type: markdown
content: >-
  {#- Z-WAVE DEVICE MONITORING TABLE -#}
  
  <h3 style="padding: 12px 12px 8px; margin: 0;">Z-Wave JS Health</h3>
  <div style="height: 500px; overflow-y: auto; padding: 0 8px;">
    <table style="width: 100%; border-collapse: collapse; font-size: 0.85rem; table-layout: fixed;">
      <thead style="position: sticky; top: 0; background: var(--card-background-color, white); z-index: 1;">
        <tr style="border-bottom: 2px solid var(--divider-color); color: var(--secondary-text-color);">
          <th style="text-align: center; padding: 8px 4px; width: 45px;">ID</th>
          <th style="text-align: left; padding: 8px 4px;">Device Name</th>
          <th style="text-align: center; padding: 8px 4px; width: 45px;">Bat</th>
          <th style="text-align: center; padding: 8px 4px; width: 35px;">St</th>
          <th style="text-align: right; padding: 8px 4px; width: 55px;">Seen</th>
        </tr>
      </thead>
      <tbody>
        {%- set ns = namespace(devices=[]) %}
        {%- for entity in integration_entities('zwave_js') %}
          {%- set dev_id = device_id(entity) %}
          {%- if dev_id %}
            {%- set identifiers = device_attr(dev_id, 'identifiers') %}
            {%- for id_tuple in identifiers %}
              {%- if id_tuple[0] == 'zwave_js' and '-' in id_tuple[1] and ':' not in id_tuple[1] %}
                {%- set node_id = id_tuple[1].split('-')[-1] | int(0) %}
                {%- if node_id > 0 and not ns.devices | selectattr('id', 'eq', node_id) | list %}
                  {%- set name = device_attr(dev_id, 'name_by_user') or device_attr(dev_id, 'name') %}
                  {%- set all_ents = device_entities(dev_id) %}
                  
                  {%- set batt_list = all_ents | select('match', 'sensor\.') | select('is_state_attr', 'device_class', 'battery') | list %}
                  {%- set batt_ent = batt_list | first if batt_list | length > 0 else none %}
                  {%- set batt_val = states(batt_ent) if batt_ent else '-' %}
                  {%- set batt_display = (batt_val ~ '%') if batt_val | is_number else '-' %}
                  
                  {%- set seen_list = all_ents | select('search', 'last_seen') | list %}
                  {%- set seen_ent = seen_list | first if seen_list | length > 0 else none %}
                  {%- set last_seen = '-' %}
                  {%- if seen_ent and has_value(seen_ent) %}
                    {%- set dt = states(seen_ent) | as_datetime %}
                    {%- if dt %}
                      {%- set t = relative_time(dt) %}
                      {%- if t %}
                        {%- set last_seen = t.replace(" minutes", "m").replace(" minute", "m")
                                             .replace(" hours", "h").replace(" hour", "h")
                                             .replace(" days", "d").replace(" day", "d")
                                             .replace(" ago", "") %}
                      {%- endif %}
                    {%- endif %}
                  {%- endif %}
                  
                  {%- set stat_list = all_ents | select('search', 'node_status') | list %}
                  {%- set stat_ent = stat_list | first if stat_list | length > 0 else none %}
                  {%- set raw_status = states(stat_ent) if stat_ent else 'unknown' %}
                  {%- set status_icon = {'alive': '🟢', 'asleep': '💤', 'dead': '🔴'}.get(raw_status, '💤' if last_seen != '-' else '❓') %}

                  {%- set ns.devices = ns.devices + [{'id': node_id, 'dev_id': dev_id, 'name': name, 'batt': batt_display, 'status': status_icon, 'seen': last_seen}] %}
                {%- endif %}
              {%- endif %}
            {%- endfor %}
          {%- endif %}
        {%- endfor %}
        
        {%- for dev in ns.devices | sort(attribute='name') %}
        <tr style="border-bottom: 1px solid var(--divider-color);">
          <td style="text-align: center; padding: 8px 4px; font-family: monospace; font-weight: bold;">{{ dev.id }}</td>
          <td style="padding: 8px 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
            <a href="/config/devices/device/{{ dev.dev_id }}" style="text-decoration: none; color: var(--primary-color);">{{ dev.name }}</a>
          </td>
          <td style="text-align: center; padding: 8px 4px; font-size: 0.9em;">{{ dev.batt }}</td>
          <td style="text-align: center; padding: 8px 4px;">{{ dev.status }}</td>
          <td style="text-align: right; padding: 8px 4px; font-size: 0.85em; color: var(--secondary-text-color);">{{ dev.seen }}</td>
        </tr>
        {%- endfor %}
      </tbody>
    </table>
  </div>
card_mod:
  style: |
    ha-card {
      padding: 0px;
      border-radius: var(--ha-card-border-radius, 12px);
    }
